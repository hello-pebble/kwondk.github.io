<div class="sidebar">
  <nav class="sidebar-nav">
    <a class="sidebar-nav-item{% if page.url == '/' %} active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
    <a class="sidebar-nav-item{% if page.url == '/resume/' %} active{% endif %}" href="{{ '/resume/' | relative_url }}">이력서</a>
    <a class="sidebar-nav-item{% if page.url == '/portfolio/' %} active{% endif %}" href="{{ '/portfolio/' | relative_url }}">포트폴리오</a>
    <a class="sidebar-nav-item{% if page.url == '/study/' %} active{% endif %}" href="{{ '/study/' | relative_url }}">스터디</a>
  </nav>
  <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
</div>

<script>
  const toggle = document.getElementById('theme-toggle');
  const currentTheme = localStorage.getItem('theme') || 'light';
  
  if (currentTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    toggle.textContent = 'Light Mode';
  }

  toggle.addEventListener('click', () => {
    let theme = document.documentElement.getAttribute('data-theme');
    if (theme === 'dark') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('theme', 'light');
      toggle.textContent = 'Dark Mode';
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      localStorage.setItem('theme', 'dark');
      toggle.textContent = 'Light Mode';
    }
  });
</script>
